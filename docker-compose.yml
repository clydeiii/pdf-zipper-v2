services:
  pdfzipper-v2:
    build: .
    container_name: pdfzipper-v2
    restart: unless-stopped
    # Run as host user to avoid root-owned files in ./data
    user: "1000:1000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002

      # Redis (external container with processing history)
      - REDIS_HOST=pdfzipper-redis
      - REDIS_PORT=6379

      # Data directory
      - DATA_DIR=/data

      # Ollama (on mac.mini)
      - OLLAMA_HOST=http://mac.mini:11434
      - OLLAMA_MODEL=gemma4:e4b
      # Use larger model for transcript formatting + metadata enrichment
      - TRANSCRIPT_FORMAT_MODEL=gemma4:latest

      # llama.cpp OpenAI-compatible server for text-only round-robin/failover
      # (used by metadata enrichment only; vision + transcript formatting stay on Ollama)
      - LLAMACPP_HOST=http://10.0.0.81:8080
      - LLAMACPP_API_KEY=${LLAMACPP_API_KEY:-}
      - LLAMACPP_MODEL=gemma4

      # Parakeet-TDT 0.6B MLX on Mac mini (was: Whisper ASR on 10.0.0.81:9002)
      - WHISPER_HOST=http://mac.mini:9003
      # Parakeet-TDT 0.6B ONNX on Ubuntu M1 Pro (CPU, ~20x realtime). Used
      # only when mac.mini fails a /health pre-flight check. Same API shape.
      - WHISPER_HOST_FALLBACK=http://10.0.0.81:9003

      # Karakeep feed (container name on proxy-network)
      - KARAKEEP_FEED_URL=${KARAKEEP_FEED_URL:-}
      - FEED_POLL_INTERVAL_MINUTES=5

      # Karakeep API for retention cleanup (delete bookmarks older than KARAKEEP_RETENTION_DAYS)
      - KARAKEEP_API_BASE=http://karakeep-web-1:3000
      - KARAKEEP_API_TOKEN=${KARAKEEP_API_TOKEN:-}
      - KARAKEEP_RETENTION_DAYS=90

      # pdf-zipper-v2 retention (delete data/media/YYYY-WWW dirs older than RETENTION_DAYS)
      - RETENTION_DAYS=90

      # Nitter for Twitter URLs (container name on proxy-network)
      - NITTER_HOST=http://nitter:8080

      # Quality threshold (0-100)
      - QUALITY_THRESHOLD=50

      # Playwright tuning
      - CONCURRENCY=2
      - NAV_TIMEOUT_MS=60000
      - PDF_TIMEOUT_MS=90000

      # Discord notifications
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}

      # Cookies file for paywalls (general — substack, NYT, etc.)
      - COOKIES_FILE=/data/cookies.txt
      # Dedicated YouTube cookies. Only used as a fallback after an anonymous
      # yt-dlp metadata fetch fails.
      # Kept distinct from COOKIES_FILE because the shared paywall cookies
      # can trigger YouTube bot-detection.
      - YT_DLP_COOKIES_FILE=${YT_DLP_COOKIES_FILE:-/data/yt-cookies.txt}

      # Privacy filter - hide elements containing these terms (comma-separated)
      - PRIVACY_FILTER_TERMS=${PRIVACY_FILTER_TERMS:-}

      # AI Self-Healing Fix System
      - FIX_ENABLED=true
      - CLAUDE_CLI_PATH=/home/clyde/.local/bin/claude
      # Direct path to the JS entrypoint — `/usr/bin/codex` symlink fails under
      # Node 20.20 ESM (import.meta.url stays as the symlink path, so the bin
      # script can't find @openai/codex-linux-x64 in its sibling node_modules).
      - CODEX_CLI_PATH=/usr/lib/node_modules/@openai/codex/bin/codex.js
      - CODEX_CLI_ARGS=${CODEX_CLI_ARGS:-}
      - FIX_PROVIDER_TIMEOUT_MINUTES=30
      - API_AUTH_TOKEN=${API_AUTH_TOKEN:-}
      - JSON_BODY_LIMIT=1mb
      - COOKIES_BODY_LIMIT=5mb
      - MANUAL_CAPTURE_BODY_LIMIT=50mb
      - MAX_DIRECT_PDF_MB=100
      - DIRECT_DOWNLOAD_TIMEOUT_MS=120000
      - MEDIA_DOWNLOAD_TIMEOUT_MS=300000
      - MAX_PODCAST_AUDIO_MB=750
      - PODCAST_DOWNLOAD_TIMEOUT_MS=600000
      - MAX_VIDEO_TRANSCRIBE_MB=500
      - HOME=/home/clyde

    ports:
      - "3002:3002"
    volumes:
      - ./data:/data
      # Claude CLI for AI self-healing fix system
      - /home/clyde/.local/share/claude:/home/clyde/.local/share/claude:ro
      - /home/clyde/.local/bin:/home/clyde/.local/bin:ro
      - /home/clyde/.claude:/home/clyde/.claude
      # Codex CLI for AI self-healing fix system (npm-installed @openai/codex).
      # CODEX_CLI_PATH points at the JS entry directly — no symlink wrapper needed.
      - /usr/lib/node_modules/@openai/codex:/usr/lib/node_modules/@openai/codex:ro
      - /home/clyde/.codex:/home/clyde/.codex
      # Project source at same path for Claude Code to edit
      - /home/clyde/pdf-zipper-v2:/home/clyde/pdf-zipper-v2
    shm_size: "512m"
    mem_limit: 1536m
    memswap_limit: 2048m
    networks:
      - proxy-network
      - default


networks:
  proxy-network:
    external: true
